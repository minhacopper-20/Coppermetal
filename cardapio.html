<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Março 2026 &mdash; Coppermetal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --copper: #c0392b;
    --copper-light: #e05a4a;
    --copper-dark: #922b21;
    --cream: #fdf5f5;
    --warm-white: #fff8f8;
    --charcoal: #2c1616;
    --mid: #7a4040;
    --soft: #f0d6d6;
    --green: #4a7c59;
    --green-light: #edf5f0;
    --orange: #e07b39;
    --orange-light: #fdf0e6;
    --purple: #7c5cbf;
    --purple-light: #f0ecfa;
    --shadow: 0 4px 24px rgba(44,16,16,0.10);
    --shadow-lg: 0 8px 40px rgba(44,16,16,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, var(--copper-dark) 0%, var(--copper) 60%, var(--copper-light) 100%);
    padding: 28px 40px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-lg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .header-left p {
    color: rgba(255,255,255,0.75);
    font-size: 0.82rem;
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .today-badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .btn-rh {
    background: #fff;
    color: var(--copper-dark);
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-rh:hover { background: var(--soft); transform: translateY(-1px); }

  /* ===== TABS ===== */
  .tabs-bar {
    background: var(--warm-white);
    border-bottom: 2px solid var(--soft);
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 14px 22px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    margin-bottom: -2px;
  }
  .tab-btn:hover { color: var(--copper); }
  .tab-btn.active {
    color: var(--copper-dark);
    border-bottom-color: var(--copper);
    font-weight: 600;
  }
  .tab-btn.today-tab {
    color: var(--copper);
  }
  .tab-btn.today-tab.active {
    color: var(--copper-dark);
  }

  /* ===== MAIN ===== */
  main {
    max-width: 900px;
    margin: 36px auto;
    padding: 0 24px 60px;
  }

  /* ===== NOME INPUT ===== */
  .nome-section {
    background: var(--warm-white);
    border: 1.5px solid var(--soft);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }

  .nome-section label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--mid);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .nome-input {
    flex: 1;
    border: 1.5px solid var(--soft);
    border-radius: 10px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--charcoal);
    background: #fff;
    outline: none;
    transition: border 0.2s;
  }
  .nome-input:focus { border-color: var(--copper-light); }

  /* ===== DAY CARD ===== */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 0;
  }

  .day-card-header {
    background: linear-gradient(100deg, var(--copper) 0%, var(--copper-light) 100%);
    padding: 22px 28px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .day-card-header .date-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #fff;
    line-height: 1;
  }
  .day-card-header .date-num {
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .day-card-header .special-tag {
    background: rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.4);
  }

  /* Menu rows */
  .menu-grid {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 0;
  }

  .menu-row {
    display: contents;
  }

  .menu-row > .label-cell {
    background: var(--cream);
    padding: 14px 18px 14px 28px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--mid);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--soft);
    display: flex;
    align-items: center;
  }

  .menu-row > .value-cell {
    padding: 14px 28px;
    font-size: 0.92rem;
    color: var(--charcoal);
    border-bottom: 1px solid var(--soft);
    display: flex;
    align-items: center;
    font-weight: 400;
  }

  .menu-row:last-child > .label-cell,
  .menu-row:last-child > .value-cell { border-bottom: none; }

  /* ===== CHOICE SECTION ===== */
  .choice-section {
    padding: 26px 28px 28px;
    border-top: 2px solid var(--soft);
    background: var(--warm-white);
  }

  .choice-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--mid);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .choice-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .choice-card {
    border: 2px solid var(--soft);
    border-radius: 14px;
    padding: 18px 14px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    background: #fff;
    position: relative;
    user-select: none;
  }

  .choice-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
  }

  .choice-card.selected {
    transform: translateY(-3px) scale(1.03);
    box-shadow: var(--shadow-lg);
  }

  .choice-card.p-card { --c: var(--green); --cl: var(--green-light); }
  .choice-card.o-card { --c: var(--orange); --cl: var(--orange-light); }
  .choice-card.ovo-card { --c: var(--purple); --cl: var(--purple-light); }

  .choice-card.selected {
    border-color: var(--c);
    background: var(--cl);
  }

  .choice-letter {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--soft);
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--mid);
    transition: all 0.22s;
  }

  .choice-card.selected .choice-letter {
    background: var(--c);
    color: #fff;
  }

  .choice-name {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--charcoal);
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }

  .choice-desc {
    font-size: 0.74rem;
    color: var(--mid);
    font-weight: 300;
    line-height: 1.4;
  }

  .choice-prato {
    font-size: 0.78rem;
    color: var(--charcoal);
    font-weight: 500;
    margin-top: 6px;
    font-style: italic;
  }

  .check-icon {
    position: absolute;
    top: 10px;
    right: 12px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--c);
    color: #fff;
    font-size: 0.7rem;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .choice-card.selected .check-icon { display: flex; }

  /* Confirm button */
  .btn-confirm {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--copper-dark), var(--copper));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-confirm:disabled { background: var(--soft); color: var(--mid); cursor: not-allowed; transform: none; }

  .confirmed-msg {
    display: none;
    margin-top: 14px;
    background: var(--green-light);
    border: 1.5px solid var(--green);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 0.85rem;
    color: var(--green);
    font-weight: 600;
    text-align: center;
  }
  .confirmed-msg.show { display: block; }

  .weekend-msg {
    background: var(--soft);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    color: var(--mid);
  }
  .weekend-msg .icon { font-size: 2.4rem; margin-bottom: 12px; }
  .weekend-msg h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--copper); margin-bottom: 6px; }
  .weekend-msg p { font-size: 0.85rem; font-weight: 300; }

  /* ===== RH MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 22px;
    width: 90%;
    max-width: 760px;
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(44,36,22,0.25);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes modalIn {
    from { transform: scale(0.88) translateY(24px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-header {
    background: linear-gradient(135deg, var(--copper-dark), var(--copper));
    padding: 22px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: 1.3rem;
  }
  .modal-header p { color: rgba(255,255,255,0.7); font-size: 0.78rem; margin-top: 2px; }

  .btn-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .btn-close:hover { background: rgba(255,255,255,0.35); }

  .modal-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px 28px;
  }

  .rh-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn-export {
    background: var(--copper);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-export:hover { background: var(--copper-dark); }

  .btn-clear {
    background: var(--soft);
    color: var(--mid);
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { background: #ddd4c5; }

  .rh-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .rh-table th {
    background: var(--cream);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--soft);
  }
  .rh-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--soft);
    color: var(--charcoal);
    vertical-align: middle;
  }
  .rh-table tr:last-child td { border-bottom: none; }
  .rh-table tr:hover td { background: var(--cream); }

  .badge-p { background: var(--green-light); color: var(--green); border-radius: 6px; padding: 3px 10px; font-weight: 700; font-size: 0.78rem; }
  .badge-o { background: var(--orange-light); color: var(--orange); border-radius: 6px; padding: 3px 10px; font-weight: 700; font-size: 0.78rem; }
  .badge-ovo { background: var(--purple-light); color: var(--purple); border-radius: 6px; padding: 3px 10px; font-weight: 700; font-size: 0.78rem; }

  .empty-rh {
    text-align: center;
    padding: 40px;
    color: var(--mid);
    font-size: 0.88rem;
  }

  /* stats */
  .rh-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
  }
  .stat-card.sp { background: var(--green-light); }
  .stat-card.so { background: var(--orange-light); }
  .stat-card.sovo { background: var(--purple-light); }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
  }
  .stat-card.sp .stat-num { color: var(--green); }
  .stat-card.so .stat-num { color: var(--orange); }
  .stat-card.sovo .stat-num { color: var(--purple); }
  .stat-label { font-size: 0.74rem; font-weight: 600; color: var(--mid); margin-top: 4px; }

  /* view toggle */
  .view-toggle {
    display: flex;
    gap: 6px;
    background: var(--soft);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 18px;
  }
  .view-btn {
    flex: 1;
    border: none;
    background: none;
    border-radius: 7px;
    padding: 7px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.18s;
  }
  .view-btn.active {
    background: #fff;
    color: var(--copper-dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* day breakdown */
  .day-breakdown { display: flex; flex-direction: column; gap: 10px; }
  .day-row {
    background: #fff;
    border: 1.5px solid var(--soft);
    border-radius: 12px;
    overflow: hidden;
  }
  .day-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--cream);
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .day-row-title { font-weight: 700; font-size: 0.85rem; color: var(--charcoal); white-space: nowrap; }
  .day-row-total { font-size: 0.75rem; color: var(--mid); font-weight: 400; white-space: nowrap; }
  .day-bars { display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap; }
  .bar-wrap { display: flex; align-items: center; gap: 5px; }
  .bar-label { font-size: 0.7rem; font-weight: 700; color: var(--mid); width: 28px; }
  .bar-track {
    width: 60px;
    height: 8px;
    background: var(--soft);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .bar-fill.bp { background: var(--green); }
  .bar-fill.bo { background: var(--orange); }
  .bar-fill.bovo { background: var(--purple); }
  .bar-count { font-size: 0.72rem; font-weight: 700; color: var(--charcoal); min-width: 14px; }
  .chevron { font-size: 0.7rem; color: var(--mid); transition: transform 0.2s; }
  .day-row.open .chevron { transform: rotate(180deg); }

  .day-row-body {
    display: none;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--soft);
  }
  .day-row-body.open { display: block; }
  .day-row-body table { width: 100%; font-size: 0.82rem; border-collapse: collapse; }
  .day-row-body td { padding: 5px 8px; border-bottom: 1px solid var(--soft); }
  .day-row-body tr:last-child td { border-bottom: none; }
  .day-row-body .col-nome { color: var(--charcoal); font-weight: 500; }
  .day-row-body .col-prato { color: var(--mid); font-size: 0.78rem; }

  @media (max-width: 600px) {
    header { padding: 18px 20px; flex-wrap: wrap; gap: 10px; }
    .header-left h1 { font-size: 1.3rem; }
    .tabs-bar { padding: 0 16px; }
    main { padding: 0 14px 60px; }
    .nome-section { flex-direction: column; align-items: flex-start; }
    .menu-grid { grid-template-columns: 100px 1fr; }
    .choice-cards { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .choice-letter { width: 38px; height: 38px; font-size: 1.1rem; }
    .rh-stats { grid-template-columns: repeat(3,1fr); }
    .modal { width: 96%; max-height: 92vh; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🍽 Cardápio de Março</h1>
    <p>Coppermetal · 2026 · Nutricionista Milena Viana CRN3 64452</p>
  </div>
  <div class="header-right">
    <span class="today-badge" id="todayBadge">&mdash;</span>
    <button class="btn-rh" onclick="openRH()">📋 Painel RH</button>
  </div>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<main>
  <div class="nome-section">
    <label>👤 Seu nome:</label>
    <input class="nome-input" id="nomeInput" type="text" placeholder="Digite seu nome completo para registrar sua escolha..." autocomplete="off">
  </div>

  <div id="panelsContainer"></div>
</main>

<!-- RH MODAL -->
<div class="modal-overlay" id="rhModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>📋 Painel RH &mdash; Março 2026</h2>
        <p>Todas as escolhas registradas no mês</p>
      </div>
      <button class="btn-close" onclick="closeRH()">✕</button>
    </div>
    <div class="modal-body">
      <div class="rh-stats">
        <div class="stat-card sp"><div class="stat-num" id="statP">0</div><div class="stat-label">Principal (P)</div></div>
        <div class="stat-card so"><div class="stat-num" id="statO">0</div><div class="stat-label">Opção (O)</div></div>
        <div class="stat-card sovo"><div class="stat-num" id="statOvo">0</div><div class="stat-label">Ovo</div></div>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="vbDia" onclick="setView('dia')">📅 Por dia</button>
        <button class="view-btn" id="vbLista" onclick="setView('lista')">📋 Lista geral</button>
      </div>
      <div id="rhViewDia"></div>
      <div id="rhViewLista" style="display:none"></div>
      <div class="rh-actions" style="margin-top:18px">
        <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
        <button class="btn-clear" onclick="clearAll()">🗑 Limpar dados</button>
      </div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYBLG7rbJSV362HoDWlOBbwCu5H4CE_PyOd92uYw7pqPwcrgNVTxDyAya1uiW_n1wi/exec";

// ===================== CARDÁPIO DATA =====================

// ===================== GOOGLE SHEETS API =====================
let _cache = null;
let _cacheTs = 0;
const CACHE_TTL = 30000;

function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_gs_cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('script error')); };
    script.src = url + '?callback=' + cbName;
    document.head.appendChild(script);
  });
}

// Normaliza qualquer formato de data para "2026-03-09"
function normalizeDia(val) {
  if (!val) return '';
  const s = String(val);
  // Formato ISO: "2026-03-09T03:00:00.000Z" - pega so os 10 primeiros chars
  if (s.length > 10 && s.includes('T')) return s.substring(0, 10);
  // Ja esta no formato correto "2026-03-09"
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return s;
}

async function loadEscolhas() {
  const now = Date.now();
  if (_cache && (now - _cacheTs) < CACHE_TTL) return _cache;
  try {
    const data = await fetchJSONP(APPS_SCRIPT_URL);
    const arr = Array.isArray(data) ? data : [];
    _cache = arr.map(e => ({
      nome:  e.nome  || '',
      dia:   normalizeDia(e.dia   || ''),
      opcao: e.opcao || '',
      prato: e.prato || '',
      ts:    e.ts    || ''
    })).filter(e => e.nome && e.dia && e.opcao);
    _cacheTs = now;
    return _cache;
  } catch(err) {
    console.warn('loadEscolhas error:', err);
    return _cache || [];
  }
}

async function saveEscolha(nome, dia, opcao, prato) {
  _cache = null;
  const d = cardapio[dia];
  const payload = { nome, dia, diaSemana: d ? d.label : '', data: d ? d.date : dia, opcao, prato, ts: new Date().toLocaleString('pt-BR') };
  try {
    await fetch(APPS_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
  } catch(err) { console.error('saveEscolha error:', err); }
}

// ===================== HELPERS =====================
function getPratoLabel(key, opcao) {
  const d = cardapio[key];
  if (!d) return '';
  if (opcao === 'P') return d.principal;
  if (opcao === 'O') return d.opcao;
  return 'Ovo';
}

function badgeHTML(opcao) {
  if (opcao === 'P')   return '<span class="badge-p">Principal</span>';
  if (opcao === 'O')   return '<span class="badge-o">Opção</span>';
  return '<span class="badge-ovo">Ovo</span>';
}

function getTodayKey() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

let pendingChoices = {};
let currentView = 'dia';

// ===================== TABS =====================
function switchTab(key) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const tab = document.querySelector('[data-key="' + key + '"]');
  if (tab) tab.classList.add('active');
  const panel = document.getElementById('panel-' + key);
  if (panel) panel.classList.add('active');
}

// ===================== CHOICE =====================
function selectChoice(key, opcao) {
  const msgEl = document.getElementById('msg-' + key);
  if (msgEl && msgEl.classList.contains('show')) return;
  document.querySelectorAll('#panel-' + key + ' .choice-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('cc-' + key + '-' + opcao);
  if (card) card.classList.add('selected');
  pendingChoices[key] = opcao;
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.disabled = false;
}

async function confirmChoice(key) {
  const nome = document.getElementById('nomeInput').value.trim();
  if (!nome) { alert('Por favor, informe seu nome antes de confirmar.'); document.getElementById('nomeInput').focus(); return; }
  const opcao = pendingChoices[key];
  if (!opcao) return;

  const btn = document.getElementById('btn-' + key);
  btn.disabled = true;
  btn.textContent = '&#9203; Salvando...';

  await saveEscolha(nome, key, opcao, getPratoLabel(key, opcao));

  const msgEl = document.getElementById('msg-' + key);
  msgEl.className = 'confirmed-msg show';
  msgEl.innerHTML = '&#9989; Escolha confirmada: <strong>' + opcao + '</strong> &mdash; ' + getPratoLabel(key, opcao);
  btn.textContent = 'Confirmar Escolha';
}

// ===================== RESTORE CHOICES =====================
async function restoreChoices() {
  const nome = document.getElementById('nomeInput').value.trim();
  if (!nome) return;

  // Reset UI
  keys.forEach(key => {
    document.querySelectorAll('#panel-' + key + ' .choice-card').forEach(c => c.classList.remove('selected'));
    const msgEl = document.getElementById('msg-' + key);
    if (msgEl) { msgEl.className = 'confirmed-msg'; msgEl.innerHTML = ''; }
    const btn = document.getElementById('btn-' + key);
    if (btn) btn.disabled = true;
  });

  const all = await loadEscolhas();
  all.forEach(e => {
    if (e.nome.toLowerCase() !== nome.toLowerCase()) return;
    const card = document.getElementById('cc-' + e.dia + '-' + e.opcao);
    if (!card) return;
    document.querySelectorAll('#panel-' + e.dia + ' .choice-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    const msgEl = document.getElementById('msg-' + e.dia);
    if (msgEl) { msgEl.className = 'confirmed-msg show'; msgEl.innerHTML = '&#9989; Escolha confirmada: <strong>' + e.opcao + '</strong> &mdash; ' + getPratoLabel(e.dia, e.opcao); }
    const btn = document.getElementById('btn-' + e.dia);
    if (btn) btn.disabled = true;
  });
}

let nomeTimer = null;
// ===================== RH PANEL =====================
function setView(v) {
  currentView = v;
  document.getElementById('vbDia').classList.toggle('active', v === 'dia');
  document.getElementById('vbLista').classList.toggle('active', v === 'lista');
  document.getElementById('rhViewDia').style.display   = v === 'dia'   ? 'block' : 'none';
  document.getElementById('rhViewLista').style.display = v === 'lista' ? 'block' : 'none';
}

function openRH() {
  document.getElementById('rhModal').classList.add('open');
  renderRH();
}
function closeRH() { document.getElementById('rhModal').classList.remove('open'); }

async function renderRH() {
  document.getElementById('rhViewDia').innerHTML = '<div class="empty-rh">&#9203; Carregando...</div>';
  const all = await loadEscolhas();
  const sorted = [...all].sort((a,b) => a.dia.localeCompare(b.dia) || a.nome.localeCompare(b.nome));

  document.getElementById('statP').textContent   = all.filter(e => e.opcao==='P').length;
  document.getElementById('statO').textContent   = all.filter(e => e.opcao==='O').length;
  document.getElementById('statOvo').textContent = all.filter(e => e.opcao==='OVO').length;

  if (!sorted.length) {
    document.getElementById('rhViewDia').innerHTML   = '<div class="empty-rh">Nenhuma escolha registrada ainda.</div>';
    document.getElementById('rhViewLista').innerHTML = '<div class="empty-rh">Nenhuma escolha registrada ainda.</div>';
    return;
  }

  // --- POR DIA ---
  const byDay = {};
  sorted.forEach(e => { if (!byDay[e.dia]) byDay[e.dia]=[]; byDay[e.dia].push(e); });

  const dayHTML = Object.keys(byDay).sort().map(dia => {
    const entries = byDay[dia];
    const d = cardapio[dia];
    const dayLabel = d ? d.label + ' · ' + d.date : dia;
    const cp = entries.filter(e=>e.opcao==='P').length;
    const co = entries.filter(e=>e.opcao==='O').length;
    const covo = entries.filter(e=>e.opcao==='OVO').length;
    const mx = Math.max(cp,co,covo,1);
    const pct = v => Math.round(v/mx*100);
    const bodyRows = entries.map(e => `<tr><td class="col-nome">${e.nome}</td><td>${badgeHTML(e.opcao)}</td><td class="col-prato">${e.prato||'Ovo'}</td></tr>`).join('');
    return `<div class="day-row" id="dr-${dia}">
      <div class="day-row-header" onclick="toggleDay('${dia}')">
        <span class="day-row-title">${dayLabel}</span>
        <div class="day-bars">
          <div class="bar-wrap"><span class="bar-label">P</span><div class="bar-track"><div class="bar-fill bp" style="width:${pct(cp)}%"></div></div><span class="bar-count">${cp}</span></div>
          <div class="bar-wrap"><span class="bar-label">O</span><div class="bar-track"><div class="bar-fill bo" style="width:${pct(co)}%"></div></div><span class="bar-count">${co}</span></div>
          <div class="bar-wrap"><span class="bar-label">OVO</span><div class="bar-track"><div class="bar-fill bovo" style="width:${pct(covo)}%"></div></div><span class="bar-count">${covo}</span></div>
        </div>
        <span class="day-row-total">${entries.length} registros</span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="day-row-body" id="drb-${dia}"><table><tbody>${bodyRows}</tbody></table></div>
    </div>`;
  }).join('');
  document.getElementById('rhViewDia').innerHTML = '<div class="day-breakdown">' + dayHTML + '</div>';

  // --- LISTA GERAL ---
  const listRows = sorted.map(e => {
    const d = cardapio[e.dia];
    return `<tr><td>${e.nome}</td><td>${d ? d.label+' '+d.date : e.dia}</td><td>${badgeHTML(e.opcao)}</td><td style="font-size:.8rem;color:var(--mid)">${e.prato||'Ovo'}</td><td style="font-size:.75rem;color:var(--mid)">${e.ts}</td></tr>`;
  }).join('');
  document.getElementById('rhViewLista').innerHTML = `
    <table class="rh-table">
      <thead><tr><th>Funcion&aacute;rio</th><th>Dia</th><th>Op&ccedil;&atilde;o</th><th>Prato</th><th>Registrado em</th></tr></thead>
      <tbody>${listRows}</tbody>
    </table>`;
}

function toggleDay(dia) {
  document.getElementById('dr-'+dia).classList.toggle('open');
  document.getElementById('drb-'+dia).classList.toggle('open');
}

async function exportCSV() {
  const all = await loadEscolhas();
  if (!all.length) { alert('Nenhum dado para exportar.'); return; }
  const sorted = [...all].sort((a,b) => a.dia.localeCompare(b.dia) || a.nome.localeCompare(b.nome));

  const byDay = {};
  sorted.forEach(e => { if (!byDay[e.dia]) byDay[e.dia]=[]; byDay[e.dia].push(e); });

  const rows1 = sorted.map(e => { const d=cardapio[e.dia]; return ['"'+e.nome+'"','"'+(d?d.label:'')+'"','"'+(d?d.date:e.dia)+'"','"'+e.opcao+'"','"'+e.prato+'"','"'+e.ts+'"'].join(','); });
  const rows2 = Object.keys(byDay).sort().map(dia => {
    const en=byDay[dia]; const d=cardapio[dia];
    const cp=en.filter(e=>e.opcao==='P').length, co=en.filter(e=>e.opcao==='O').length, covo=en.filter(e=>e.opcao==='OVO').length;
    return ['"'+(d?d.date:dia)+'"','"'+(d?d.label:'')+'"',cp,co,covo,en.length].join(',');
  });
  const totalP=all.filter(e=>e.opcao==='P').length, totalO=all.filter(e=>e.opcao==='O').length, totalOVO=all.filter(e=>e.opcao==='OVO').length;
  rows2.push('"TOTAL","",'+totalP+','+totalO+','+totalOVO+','+all.length);

  const csv = [
    '=== DETALHAMENTO POR FUNCIONÁRIO ===',
    'Funcionário,Dia da Semana,Data,Opção,Prato,Registrado em',
    ...rows1, '',
    '=== RESUMO POR DIA ===',
    'Data,Dia da Semana,Principal (P),Opção (O),Ovo,Total',
    ...rows2
  ].join('\n');

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cardapio_marco_2026_relatorio.csv';
  a.click();
}

async function clearAll() {
  _cache = null;
  alert('Para limpar os dados, acesse a planilha Google Sheets e apague as linhas desejadas na aba "Respostas".');
  renderRH();
}
