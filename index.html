<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coppermetal — Portal Interno</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #fdf5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #922b21;
    margin-bottom: 6px;
    letter-spacing: -1px;
  }
  .sub {
    font-size: 0.85rem;
    color: #7a4040;
    font-weight: 300;
    margin-bottom: 48px;
    letter-spacing: 0.5px;
  }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    background: #fff;
    border: 2px solid #f0d6d6;
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    text-decoration: none;
    width: 220px;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 24px rgba(44,16,16,0.08);
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: #c0392b;
    box-shadow: 0 12px 40px rgba(44,16,16,0.15);
  }
  .card-icon { font-size: 2.4rem; margin-bottom: 14px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: #2c1616;
    margin-bottom: 6px;
  }
  .card-desc { font-size: 0.78rem; color: #7a4040; font-weight: 300; line-height: 1.5; }
  .footer {
    margin-top: 48px;
    font-size: 0.75rem;
    color: #c4a0a0;
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="logo">Coppermetal</div>
  <div class="sub">Portal Interno · Acesso Rápido</div>
  <div class="cards">
    <a class="card" href="cardapio.html">
      <div class="card-icon">🍽</div>
      <div class="card-title">Cardápio</div>
      <div class="card-desc">Consulte o cardápio do mês e registre sua escolha diária</div>
    </a>
    <a class="card" href="ramaiscopper.html">
      <div class="card-icon">📞</div>
      <div class="card-title">Ramais</div>
      <div class="card-desc">Diretório de ramais e contatos internos da empresa</div>
    </a>
  </div>
  <div class="footer">Coppermetal © 2026</div>
</body>
</html>
